<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Quest Marble Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4fce8; /* Light green background for the page */
        }
    </style>
</head>
<body>

<div id="marble-game-box" style="background: rgb(253, 246, 227); border-radius: 15px; border: 4px solid rgb(139, 69, 19); font-family: 'Segoe UI', Arial, sans-serif; margin: auto; max-width: 500px; padding: 20px; position: relative; text-align: center; touch-action: none; overflow: hidden;">
    
    <div id="category-screen" style="align-items: center; background: rgb(253, 246, 227); border-radius: 15px; box-sizing: border-box; display: flex; flex-direction: column; height: 100%; justify-content: center; left: 0px; padding: 20px; position: absolute; top: 0px; width: 100%; z-index: 110;">
        <h2 style="color: saddlebrown;">Choose a Category</h2>
        <div id="category-buttons" style="display: grid; gap: 10px; grid-template-columns: 1fr 1fr; width: 100%;">
            <button onclick="selectCategory('flowers')" style="background: rgb(231, 76, 60); border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; padding: 15px;">Flowers</button>
            <button onclick="selectCategory('fruits')" style="background: rgb(241, 196, 15); border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; padding: 15px;">Fruits</button>
            <button onclick="selectCategory('vehicles')" style="background: rgb(52, 152, 219); border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; padding: 15px;">Vehicles</button>
            <button onclick="selectCategory('numbers')" style="background: rgb(155, 89, 182); border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; padding: 15px;">Numbers</button>
            <button onclick="selectCategory('colours')" style="background: rgb(46, 204, 113); border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; padding: 15px;">Colours</button>
            <button onclick="selectCategory('vegetables')" style="background: rgb(230, 126, 34); border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; padding: 15px;">Vegetables</button>
        </div>
    </div>

    <div id="victory-screen" style="align-items: center; background: rgba(255, 255, 255, 0.95); border-radius: 15px; display: none; flex-direction: column; height: 100%; justify-content: center; left: 0px; position: absolute; top: 0px; width: 100%; z-index: 120;">
        <h1 style="font-size: 80px; margin: 0px;">🏆</h1>
        <h2 id="win-text" style="color: #27ae60; margin: 10px 0px;">CATEGORY CLEARED!</h2>
        <button onclick="location.reload()" style="background: rgb(41, 128, 185); border-radius: 8px; border: none; color: white; cursor: pointer; padding: 12px 25px;">Pick New Category</button>
    </div>

    <div style="color: #5d4037; display: flex; font-weight: bold; justify-content: space-between; margin-bottom: 5px;">
        <span id="cat-label" style="text-transform: capitalize;">Category</span>
        <span>Word: <span id="word-count">1/10</span></span>
    </div>
    
    <div id="word-slots-container" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 10px; min-height: 50px;"></div>
    
    <canvas height="650" id="gameCanvas" style="background: #e9dcc9; border-radius: 10px; border: 5px solid #5d4037; cursor: crosshair; display: block; touch-action: none; max-width: 100%;" width="450"></canvas>
    
    <div style="margin-top: 10px;">
        <button onclick="location.reload()" style="background: rgb(149, 165, 166); border-radius: 5px; border: none; color: white; cursor: pointer; font-weight: bold; padding: 8px 20px;">MENU</button>
    </div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const slotsContainer = document.getElementById('word-slots-container');
const countDisplay = document.getElementById('word-count');

const categories = {
    flowers: ["ROSE", "LILY", "LOTUS", "TULIP", "DAISY", "ORCHID", "JASMINE", "SUNFLOWR", "PANSY", "VIOLET"],
    fruits: ["APPLE", "BANANA", "MANGO", "ORANGE", "GRAPE", "PAPAYA", "CHERRY", "PEAR", "GUAVA", "PEACH"],
    vehicles: ["CAR", "BUS", "VAN", "BIKE", "TRAIN", "PLANE", "TRUCK", "SHIP", "BOAT", "SCOOTER"],
    numbers: ["ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN"],
    colours: ["RED", "BLUE", "GREEN", "YELLOW", "PINK", "ORANGE", "WHITE", "BLACK", "PURPLE", "BROWN"],
    vegetables: ["POTATO", "TOMATO", "ONION", "GARLIC", "CARROT", "RADISH", "BEANS", "GINGER", "PEAS", "CABBAGE"]
};

let activeWordList = [];
let wordIndex = 0, targetWord = "", foundCount = 0;
let isDragging = false, marbles = [], foundPositions = [];
let striker = { x: 225, y: 580, r: 24, vx: 0, vy: 0, active: false };
let dragPoint = { x: 225, y: 580 }, audioInterval;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playHitSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function speak(text) {
    window.speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.85;
    window.speechSynthesis.speak(msg);
}

function selectCategory(cat) {
    document.getElementById('category-screen').style.display = 'none';
    document.getElementById('cat-label').innerText = cat;
    activeWordList = [...categories[cat]].sort(() => Math.random() - 0.5);
    wordIndex = 0;
    startGame();
}

function startGame() {
    if (wordIndex >= activeWordList.length) {
        document.getElementById('victory-screen').style.display = 'flex';
        return;
    }
    targetWord = activeWordList[wordIndex];
    foundCount = 0;
    countDisplay.innerText = (wordIndex + 1) + "/10";
    
    // Create UI Slots
    slotsContainer.innerHTML = '';
    foundPositions = new Array(targetWord.length).fill(false);
    for (let i = 0; i < targetWord.length; i++) {
        let slot = document.createElement('div');
        slot.id = 'slot-' + i; slot.innerText = '?';
        slot.style = "width: 35px; height: 40px; background: #fff; border: 2px solid #5d4037; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; color: #333;";
        slotsContainer.appendChild(slot);
    }

    speak(targetWord);
    clearInterval(audioInterval);
    audioInterval = setInterval(() => {
        if (foundCount < targetWord.length) speak(targetWord);
        else clearInterval(audioInterval);
    }, 6000);

    setupMarbles();
    resetStriker();
}

function setupMarbles() {
    marbles = [];
    let letters = targetWord.split('');
    let alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').filter(l => !letters.includes(l));
    let pool = [...letters];
    while(pool.length < 8) pool.push(alphabet[Math.floor(Math.random()*alphabet.length)]);
    pool.sort(() => Math.random() - 0.5);

    for (let char of pool) {
        let placed = false;
        let attempts = 0;
        while (!placed && attempts < 200) {
            let tx = 50 + Math.random() * 350;
            let ty = 60 + Math.random() * 380;
            if (!marbles.some(m => Math.hypot(tx - m.x, ty - m.y) < 100)) {
                marbles.push({ x: tx, y: ty, r: 28, letter: char, hit: false });
                placed = true;
            }
            attempts++;
        }
    }
}

function resetStriker() {
    striker.x = 225; striker.y = 580; striker.vx = 0; striker.vy = 0; striker.active = false;
}

// --- INPUT LOGIC ---
function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    // Use scaling ratio to get correct coordinates if canvas scales down in CSS
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { 
        x: (cx - rect.left) * scaleX, 
        y: (cy - rect.top) * scaleY 
    };
}

const handleStart = (e) => {
    const p = getCanvasPos(e);
    if (Math.hypot(p.x - striker.x, p.y - striker.y) < 60 && !striker.active) {
        isDragging = true;
        dragPoint = p;
        if (e.cancelable) e.preventDefault();
    }
};

const handleMove = (e) => { 
    if (isDragging) dragPoint = getCanvasPos(e); 
    if (isDragging && e.cancelable) e.preventDefault(); 
};

const handleEnd = () => {
    if (isDragging) {
        isDragging = false;
        striker.vx = (striker.x - dragPoint.x) * 0.18;
        striker.vy = (striker.y - dragPoint.y) * 0.18;
        striker.active = true;
    }
};

canvas.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);
canvas.addEventListener('touchstart', handleStart, { passive: false });
window.addEventListener('touchmove', handleMove, { passive: false });
window.addEventListener('touchend', handleEnd);

function update() {
    if (striker.active) {
        striker.x += striker.vx; striker.y += striker.vy;
        striker.vx *= 0.985; striker.vy *= 0.985;
        if (striker.x < striker.r || striker.x > canvas.width - striker.r) striker.vx *= -0.7;
        if (striker.y < striker.r || striker.y > canvas.height - striker.r) striker.vy *= -0.7;

        marbles.forEach(m => {
            if (!m.hit && Math.hypot(striker.x - m.x, striker.y - m.y) < striker.r + m.r) {
                playHitSound();
                checkLetter(m);
                striker.vx *= -0.5; striker.vy *= -0.5;
            }
        });
        if (Math.hypot(striker.vx, striker.vy) < 0.3) resetStriker();
    }
    draw();
    requestAnimationFrame(update);
}

function checkLetter(m) {
    for (let i = 0; i < targetWord.length; i++) {
        if (targetWord[i] === m.letter && !foundPositions[i]) {
            foundPositions[i] = true;
            document.getElementById('slot-' + i).innerText = m.letter;
            document.getElementById('slot-' + i).style.background = "#d4efdf";
            m.hit = true; foundCount++;
            break;
        }
    }
    if (foundCount === targetWord.length) {
        clearInterval(audioInterval);
        wordIndex++;
        setTimeout(startGame, 1500);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    marbles.forEach(m => {
        if (!m.hit) {
            ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
            ctx.fillStyle = "#fff8e1"; ctx.fill();
            ctx.strokeStyle = "#8b4513"; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = "#2c3e50"; ctx.font = "bold 26px Arial";
            ctx.textAlign = "center"; ctx.fillText(m.letter, m.x, m.y + 10);
        }
    });

    if (isDragging) {
        ctx.beginPath(); ctx.moveTo(striker.x, striker.y); ctx.lineTo(dragPoint.x, dragPoint.y);
        ctx.strokeStyle = "#2980b9"; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
        let angle = Math.atan2(striker.y - dragPoint.y, striker.x - dragPoint.x);
        ctx.beginPath(); ctx.arc(striker.x + Math.cos(angle)*70, striker.y + Math.sin(angle)*70, 7, 0, Math.PI*2);
        ctx.fillStyle = "#27ae60"; ctx.fill();
    }

    ctx.beginPath(); ctx.arc(striker.x, striker.y, striker.r, 0, Math.PI*2);
    ctx.fillStyle = "#2980b9"; ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();
}
update();
</script>

</body>
</html>
